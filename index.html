        `,
        registry: `
          <h2>Register</h2>
          <p>Efter den aktive forskningsfase videreføres data og biologisk materiale som en national register- og biobankplatform.</p>
          <p>Platformen skal understøtte fremtidige godkendte forskningsprojekter og en langsigtet infrastruktur for forskning i bronkiektasier hos børn.</p>
        `,
        contact: `
          <h2>Kontakt</h2>
          <p>Børn og Unge, Børnecenter for Lunge- og Allergisygdomme (BCLA), Aarhus Universitetshospital (AUH)</p>
          <p>E-mail: <a href="mailto:auh.bronkiektasi@rm.dk">auh.bronkiektasi@rm.dk</a></p>
        `
      }
    };

    let lang = "en";

    function setLang(l) {
      lang = l;
      updateNav();
      loadContent();
      updateLanguageButtons();
    }

    function updateNav() {
      const n = content[lang].nav;
      document.querySelector("[data-page='home']").textContent = n.home;
      document.querySelector("[data-page='about']").textContent = n.about;
      document.querySelector("[data-page='whoweare']").textContent = n.whoweare;
      document.querySelector("[data-page='patient']").textContent = n.patient;
      document.querySelector("[data-page='publications']").textContent = n.publications;
      document.querySelector("[data-page='registry']").textContent = n.registry;
      document.querySelector("[data-page='contact']").textContent = n.contact;
      document.getElementById("menuLabel").textContent = "Menu";
      document.documentElement.lang = lang;
    }

    function loadContent() {
      document.getElementById("heroTitle").textContent = content[lang].hero.title;
      document.getElementById("heroText").textContent = content[lang].hero.text;
      document.getElementById("heroButton").textContent = content[lang].hero.button;

      document.getElementById("homeText").innerHTML = content[lang].home;
      document.getElementById("newsText").innerHTML = content[lang].news;
      document.getElementById("featuredPub").innerHTML = content[lang].featuredPub;
      document.getElementById("collaboratorBox").innerHTML = content[lang].collaboratorBox;
      document.getElementById("aboutText").innerHTML = content[lang].about;
      document.getElementById("whoText").innerHTML = content[lang].whoweare;
      document.getElementById("patientText").innerHTML = content[lang].patient;
      document.getElementById("pubText").innerHTML = content[lang].publications;
      document.getElementById("registryText").innerHTML = content[lang].registry;
      document.getElementById("contactText").innerHTML = content[lang].contact;
    }

    function updateLanguageButtons() {
      document.getElementById("btn-en").classList.remove("active-lang");
      document.getElementById("btn-da").classList.remove("active-lang");
      document.getElementById("btn-" + lang).classList.add("active-lang");
    }

    function toggleMenu() {
      document.getElementById("mobileMenu").classList.toggle("open");
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(pageId).classList.add("active");

      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
      const activeBtn = document.querySelector(`[data-page='${pageId}']`);
      if (activeBtn) activeBtn.classList.add("active");

      if (window.innerWidth <= 700) {
        document.getElementById("mobileMenu").classList.remove("open");
      }
    }

    function goHome() {
      showPage("home");
    }

    function goToPublications() {
      showPage("publications");
    }

    const buttons = document.querySelectorAll("nav button");
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        showPage(btn.dataset.page);
      });
    });

    updateNav();
    loadContent();
    updateLanguageButtons();
    showPage("home");
  </script>
</body>
</html>
